title: IdentitiesConfig
type: object
description: |
  Map of named identities. Each key is a user-defined identity name that doubles as the
  environment variable injected into the step, and each value is an IdentitySpec.
  Reserved names (HARNESS_*, PATH, HOME, AWS_*/GOOGLE_*/AZURE_*) are not allowed, and a
  step may declare at most 10 identities.
maxProperties: 10
propertyNames:
  pattern: ^(?!HARNESS_)(?!AWS_)(?!GOOGLE_)(?!AZURE_)(?!PATH$)(?!HOME$)[A-Za-z_][A-Za-z0-9_]*$
additionalProperties:
  $ref: identity-spec.yaml
$schema: http://json-schema.org/draft-07/schema#
