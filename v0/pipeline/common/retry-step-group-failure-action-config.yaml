title: RetryStepGroupFailureActionConfig
type: object
properties:
  type:
    type: string
    enum:
      - RetryStepGroup
  spec:
    type: object
    properties:
      retryCount:
        type: object
      retryIntervals:
        type: object
      onRetryFailure:
        type: object
        properties:
          action:
            $ref: failure-strategy-action-config.yaml
      condition:
        type: object
        properties:
          value:
            type: string
            description: "Expression that evaluates to determine if retry should be performed, e.g. '<+step.exitCode> == 137'"
          expression:
            type: object
$schema: http://json-schema.org/draft-07/schema#
