title: MergePRStepInfo
$ref: ../../common/step-spec-type.yaml
$schema: http://json-schema.org/draft-07/schema#
type: object
required:
- deleteSourceBranch
properties:
  delegateSelectors:
    oneOf:
    - type: array
      items:
        type: string
    - type: string
      pattern: (<\+.+>.*)
      minLength: 1
  deleteSourceBranch:
    oneOf:
    - type: boolean
    - type: string
  disableGitRestraint:
    oneOf:
      - type: boolean
      - type: string
        pattern: (<\+.+>.*)
        minLength: 1
  mergeStrategy:
    description: "Merge strategy to use when merging the PR. Allowed values: merge, squash. Default: merge"
    oneOf:
      - type: string
        enum:
          - merge
          - squash
      - type: string
        pattern: (<\+.+>.*)
        minLength: 1
  variables:
    type: array
    items:
      oneOf:
      - $ref: ../../common/number-ng-variable.yaml
      - $ref: ../../common/secret-ng-variable.yaml
      - $ref: ../../common/string-ng-variable.yaml
  description:
    desc: This is the description for MergePRStepInfo
