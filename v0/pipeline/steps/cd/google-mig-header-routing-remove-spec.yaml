$schema: http://json-schema.org/draft-07/schema#
title: GoogleMigHeaderRoutingRemoveSpec
type: object
required:
  - key
properties:
  key:
    oneOf:
      - type: string
      - type: string
        pattern: (<\+.+>.*)
        minLength: 1
    description: "HTTP header key of the rule to remove. Supports fixed value or expression."
