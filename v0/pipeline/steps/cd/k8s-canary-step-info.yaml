title: K8sCanaryStepInfo
allOf:
- $ref: ../../common/step-spec-type.yaml
- type: object
  properties:
    canaryType:
      oneOf:
      - type: string
        enum:
        - Standard
        - Progressive
      - type: string
        pattern: (<\+.+>.*)
        minLength: 1
    targetPercentage:
      oneOf:
      - type: integer
        minimum: 1
        maximum: 100
      - type: string
        pattern: (<\+.+>.*)
        minLength: 1
    commandFlags:
      oneOf:
      - type: array
        items:
          $ref: k8s-step-command-flag.yaml
      - type: string
        pattern: ^<\+input>((\.)((executionInput\(\))|(allowedValues|selectOneFrom|selectManyFrom|default|regex)\(.+?\)))*$
        minLength: 1
    delegateSelectors:
      oneOf:
      - type: array
        items:
          type: string
      - type: string
        pattern: (<\+.+>.*)
        minLength: 1
    instanceSelection:
      $ref: instance-selection-wrapper.yaml
    trafficRouting:
      $ref: k8s-traffic-routing-spec.yaml
    skipDryRun:
      oneOf:
      - type: boolean
      - type: string
- if:
    properties:
      canaryType:
        const: Progressive
    required:
    - canaryType
  then:
    required:
    - targetPercentage
  else:
    required:
    - instanceSelection
