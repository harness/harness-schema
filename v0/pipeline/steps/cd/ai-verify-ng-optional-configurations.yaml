title: AIVerifyOptionalConfigurations
description: >-
  Optional cv-nextgen parity fields; not mapped to plugin env in current release.
  The parent step may omit optionalConfigurations entirely, or supply an empty object.
  When present, every property below remains optional; set only the fields you need.
type: object
required: []
properties:
  sensitivity:
    oneOf:
    - type: string
    - type: string
      pattern: (<\+.+>.*)
      minLength: 1
  verificationType:
    oneOf:
    - type: string
    - type: string
      pattern: (<\+.+>.*)
      minLength: 1
  failOnNoAnalysis:
    oneOf:
    - type: boolean
    - type: string
      pattern: ^<\+input>((\.)((executionInput\(\))|(allowedValues|selectOneFrom|selectManyFrom|default|regex)\(.+?\)))*$
      minLength: 1
  controlNodeRegexPattern:
    oneOf:
    - type: string
    - type: string
      pattern: (<\+.+>.*)
      minLength: 1
  testNodeRegexPattern:
    oneOf:
    - type: string
    - type: string
      pattern: (<\+.+>.*)
      minLength: 1
  baselineEndTime:
    oneOf:
    - type: string
    - type: string
      pattern: (<\+.+>.*)
      minLength: 1
  verificationStartTime:
    oneOf:
    - type: string
    - type: string
      pattern: (<\+.+>.*)
      minLength: 1
$schema: http://json-schema.org/draft-07/schema#
