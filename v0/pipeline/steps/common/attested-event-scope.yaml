title: AttestedEventScope
type: object
required:
  - scope
properties:
  scope:
    type: string
    enum:
      - all
      - specific
  description:
    desc: This is the description for AttestedEventScope
$schema: http://json-schema.org/draft-07/schema#
allOf:
  - if:
      properties:
        scope:
          const: specific
    then:
      required:
        - eventTypes
      properties:
        eventTypes:
          type: array
          items:
            type: string
            enum:
              - Code
              - Test
              - Build
              - Security
              - Custom
