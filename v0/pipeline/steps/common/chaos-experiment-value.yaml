title: ChaosExperimentValue
type: object
required:
  - name
  - value
properties:
  name:
    type: string
    minLength: 1
  value:
    anyOf:
      - type: string
      - type: number
      - type: boolean
      - type: string
        pattern: "(<\\+.+>.*)"
  referenceKind:
    type: string
    enum: [ "Connector", "Secret" ]
  referenceType:
    type: string
    enum: [ "Prometheus", "AppDynamics", "SignalFX", "Dynatrace", "NewRelic", "Datadog", "Splunk", "SecretFile", "SecretText" ]
$schema: http://json-schema.org/draft-07/schema#
