title: TemplateLinkConfig
type: object
required:
- templateRef
properties:
  templateInputs:
    $ref: ../../common/json-node.yaml
  templateRef:
    type: string
  templateVariables:
    $ref: ../../common/json-node.yaml
  versionLabel:
    type: string
    pattern: ^[0-9a-zA-Z][^\s/&]{0,63}$
  label:
    type: string
    description: Optional single-token label for template resolution (case-insensitive at runtime; ASCII letters, digits, underscore, hyphen only).
    maxLength: 50
    pattern: ^[A-Za-z0-9][A-Za-z0-9_-]{0,49}$
  description:
    desc: This is the description for TemplateLinkConfig
$schema: http://json-schema.org/draft-07/schema#
