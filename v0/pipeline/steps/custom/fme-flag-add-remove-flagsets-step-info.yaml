title: FmeFlagAddRemoveFlagsetsStepInfo
allOf:
  - $ref: ../../common/step-spec-type.yaml
  - type: object
    required:
      - flagName
      - environment
    properties:
      flagName:
        description: "Feature flag name"
        oneOf:
          - $ref: ../common/fme-flag-common-flag-name.yaml
          - $ref: ../common/common-jexl.yaml
      environment:
        description: "FME Environment Name or ID"
        oneOf:
          - $ref: ../common/fme-flag-common-environment.yaml
          - $ref: ../common/common-jexl.yaml
      addFlagsets:
        description: "List of flagset names to add to the feature flag"
        oneOf:
          - type: array
            items:
              type: string
          - $ref: ../common/common-jexl.yaml
      removeFlagsets:
        description: "List of flagset names to remove from the feature flag"
        oneOf:
          - type: array
            items:
              type: string
          - $ref: ../common/common-jexl.yaml
$schema: http://json-schema.org/draft-07/schema#
