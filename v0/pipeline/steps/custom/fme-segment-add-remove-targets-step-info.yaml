title: FmeSegmentAddRemoveTargetsStepInfo
allOf:
  - $ref: ../../common/step-spec-type.yaml
  - type: object
    required:
      - name
      - environment
    properties:
      name:
        description: "Name of the segment to update"
        oneOf:
          - $ref: ../common/fme-segment-common-segment-name.yaml
          - $ref: ../common/common-jexl.yaml
      environment:
        description: "ID of the FME environment"
        oneOf:
          - $ref: ../common/fme-flag-common-environment.yaml
          - $ref: ../common/common-jexl.yaml
      addKeys:
        description: "Keys to add to the segment"
        oneOf:
          - type: array
            items:
              type: string
          - $ref: ../common/common-jexl.yaml
      removeKeys:
        description: "Keys to remove from the segment"
        oneOf:
          - type: array
            items:
              type: string
          - $ref: ../common/common-jexl.yaml
$schema: http://json-schema.org/draft-07/schema#
