title: FmeFlagCreateStepInfo
allOf:
  - $ref: ../../common/step-spec-type.yaml
  - type: object
    required:
    - trafficType
    - name
    properties:
      trafficType:
        description: "FME Traffic Type name (case-sensitive)"
        oneOf:
          - $ref: ../common/string-without-jexl.yaml
          - $ref: ../common/common-jexl.yaml
      name:
          oneOf:
            - $ref: ../common/fme-flag-common-flag-name.yaml
            - $ref: ../common/common-jexl.yaml
      description:
        description: "Feature flag description"
        oneOf:
          - $ref: ../common/string-without-jexl.yaml
          - $ref: ../common/common-jexl.yaml
      owners:
        description: "Feature flag owners"
        oneOf:
          - type: array
            items:
              type: string
          - $ref: ../common/common-jexl.yaml
      tags:
        description: "Feature flag tags"
        oneOf:
          - type: array
            items:
              type: string
              pattern: ^([a-zA-Z0-9-_]+)$
              maxItems: 20
          - $ref: ../common/common-jexl.yaml
      defaultTreatment:
        description: "Default treatment for the feature flag"
        oneOf:
          - $ref: ../common/fme-flag-common-treatment.yaml
          - $ref: ../common/common-jexl.yaml
      baselineTreatment:
        description: "Baseline treatment for the feature flag"
        oneOf:
          - $ref: ../common/fme-flag-common-treatment.yaml
          - $ref: ../common/common-jexl.yaml
      treatments:
        description: "List of treatments with their descriptions"
        oneOf:
          - type: array
            items:
              type: object
              required:
                - treatment
                - description
              properties:
                treatment:
                  oneOf:
                    - $ref: ../common/fme-flag-common-treatment.yaml
                    - $ref: ../common/common-jexl-expression-only.yaml
                description:
                  oneOf:
                    - $ref: ../common/string-without-jexl.yaml
                    - $ref: ../common/common-jexl.yaml
            minItems: 2
          - $ref: ../common/common-jexl.yaml
    dependencies:
      treatments:
        required:
          - defaultTreatment
          - baselineTreatment
      defaultTreatment:
        required:
          - treatments
          - baselineTreatment
      baselineTreatment:
        required:
          - treatments
          - defaultTreatment
$schema: http://json-schema.org/draft-07/schema#