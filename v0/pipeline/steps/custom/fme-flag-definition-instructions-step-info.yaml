title: FmeFlagDefinitionInstructionsStepInfo
allOf:
  - $ref: ../../common/step-spec-type.yaml
  - type: object
    required:
      - flagName
      - environment
      - instructions
    properties:
      flagName:
        oneOf:
          - $ref: ../common/fme-flag-common-flag-name.yaml
          - $ref: ../common/common-jexl.yaml
      environment:
        oneOf:
          - $ref: ../common/fme-flag-common-environment.yaml
          - $ref: ../common/common-jexl.yaml
      instructions:
        description: "Ordered list of flag definition instructions to apply atomically"
        oneOf:
          - type: array
            minItems: 1
            items:
              oneOf:
                - type: object
                  additionalProperties: false
                  required:
                    - type
                    - value
                  properties:
                    type:
                      const: SetDefaultTreatment
                    value:
                      oneOf:
                        - $ref: ../common/fme-flag-common-treatment.yaml
                        - $ref: ../common/common-jexl.yaml
                - type: object
                  additionalProperties: false
                  required:
                    - type
                    - value
                  properties:
                    type:
                      const: SetBaselineTreatment
                    value:
                      oneOf:
                        - $ref: ../common/fme-flag-common-treatment.yaml
                        - $ref: ../common/common-jexl.yaml
                - type: object
                  additionalProperties: false
                  required:
                    - type
                    - value
                  properties:
                    type:
                      const: SetTrackImpression
                    value:
                      oneOf:
                        - type: boolean
                        - $ref: ../common/common-jexl.yaml
                - type: object
                  additionalProperties: false
                  required:
                    - type
                    - value
                  properties:
                    type:
                      const: SetLimitExposure
                    value:
                      oneOf:
                        - type: integer
                          minimum: 0
                          maximum: 100
                        - $ref: ../common/common-jexl.yaml
                - type: object
                  additionalProperties: false
                  required:
                    - type
                    - value
                  properties:
                    type:
                      const: UpdateIndividualTargets
                    value:
                      oneOf:
                        - type: array
                          minItems: 1
                          items:
                            type: object
                            additionalProperties: false
                            required:
                              - treatment
                              - actions
                            properties:
                              treatment:
                                $ref: ../common/fme-flag-common-treatment.yaml
                              actions:
                                type: array
                                minItems: 1
                                items:
                                  type: object
                                  additionalProperties: false
                                  required:
                                    - action
                                    - value
                                  properties:
                                    action:
                                      type: string
                                      enum:
                                        - AddKeys
                                        - RemoveKeys
                                        - AddSegments
                                        - RemoveSegments
                                        - SetKeys
                                        - SetSegments
                                    value:
                                      type: array
                                      minItems: 1
                                      items:
                                        type: string
                        - $ref: ../common/common-jexl.yaml
                - type: object
                  additionalProperties: false
                  required:
                    - type
                    - value
                  properties:
                    type:
                      const: UpdateDynamicConfiguration
                    value:
                      oneOf:
                        - type: array
                          minItems: 1
                          items:
                            type: object
                            additionalProperties: false
                            required:
                              - treatment
                              - configuration
                            properties:
                              treatment:
                                $ref: ../common/fme-flag-common-treatment.yaml
                              configuration:
                                type:
                                  - string
                                  - "null"
                        - $ref: ../common/common-jexl.yaml
          - $ref: ../common/common-jexl.yaml
$schema: http://json-schema.org/draft-07/schema#
