title: FmeFlagDefinitionInstructionsStepInfo
allOf:
  - $ref: ../../common/step-spec-type.yaml
  - type: object
    required:
      - flagName
      - environment
      - instructions
    properties:
      flagName:
        oneOf:
          - $ref: ../common/fme-flag-common-flag-name.yaml
          - $ref: ../common/common-jexl.yaml
      environment:
        oneOf:
          - $ref: ../common/fme-flag-common-environment.yaml
          - $ref: ../common/common-jexl.yaml
      instructions:
        description: "Ordered list of flag definition instructions to apply atomically. Each instruction type may appear at most once (validated when using a literal array; expressions are not checked)."
        oneOf:
          - allOf:
              - type: array
                minItems: 1
                items:
                  type: object
                  additionalProperties: false
                  required:
                    - type
                    - value
                  properties:
                    type:
                      type: string
                      enum:
                        - SetDefaultTreatment
                        - SetBaselineTreatment
                        - SetTrackImpression
                        - SetLimitExposure
                        - UpdateIndividualTargets
                        - UpdateDynamicConfiguration
                        - SetTargetingRules
                    value: {}
                  allOf:
                    - if:
                        properties:
                          type:
                            enum:
                              - SetDefaultTreatment
                      then:
                        properties:
                          value:
                            oneOf:
                              - $ref: ../common/fme-flag-common-treatment.yaml
                              - $ref: ../common/common-jexl.yaml
                    - if:
                        properties:
                          type:
                            enum:
                              - SetBaselineTreatment
                      then:
                        properties:
                          value:
                            oneOf:
                              - $ref: ../common/fme-flag-common-treatment.yaml
                              - $ref: ../common/common-jexl.yaml
                    - if:
                        properties:
                          type:
                            enum:
                              - SetTrackImpression
                      then:
                        properties:
                          value:
                            oneOf:
                              - type: boolean
                              - $ref: ../common/common-jexl.yaml
                    - if:
                        properties:
                          type:
                            enum:
                              - SetLimitExposure
                      then:
                        properties:
                          value:
                            oneOf:
                              - type: integer
                                minimum: 0
                                maximum: 100
                              - $ref: ../common/common-jexl.yaml
                    - if:
                        properties:
                          type:
                            enum:
                              - UpdateIndividualTargets
                      then:
                        properties:
                          value:
                            oneOf:
                              - type: array
                                minItems: 1
                                items:
                                  type: object
                                  required:
                                    - treatment
                                    - actions
                                  properties:
                                    treatment:
                                      $ref: ../common/fme-flag-common-treatment.yaml
                                    actions:
                                      type: array
                                      minItems: 1
                                      items:
                                        type: object
                                        required:
                                          - action
                                          - value
                                        properties:
                                          action:
                                            type: string
                                            enum:
                                              - AddKeys
                                              - RemoveKeys
                                              - AddSegments
                                              - RemoveSegments
                                              - SetKeys
                                              - SetSegments
                                          value:
                                            type: array
                                            minItems: 1
                                            items:
                                              type: string
                              - $ref: ../common/common-jexl.yaml
                    - if:
                        properties:
                          type:
                            enum:
                              - UpdateDynamicConfiguration
                      then:
                        properties:
                          value:
                            oneOf:
                              - type: array
                                minItems: 1
                                items:
                                  type: object
                                  required:
                                    - treatment
                                    - configuration
                                  properties:
                                    treatment:
                                      $ref: ../common/fme-flag-common-treatment.yaml
                                    configuration:
                                      type:
                                        - string
                                        - "null"
                              - $ref: ../common/common-jexl.yaml
                    - if:
                        properties:
                          type:
                            enum:
                              - SetTargetingRules
                      then:
                        properties:
                          value:
                            oneOf:
                              - type: array
                                items:
                                  type: object
                                  required:
                                    - condition
                                    - allocation
                                  properties:
                                    condition:
                                      description: "Condition object containing rules"
                                      type: object
                                      required:
                                        - rules
                                      properties:
                                        rules:
                                          description: "List of condition rules"
                                          type: array
                                          items:
                                            type: object
                                            required:
                                              - type
                                            properties:
                                              type:
                                                type: string
                                                enum:
                                                  - IN_SEGMENT
                                                  - IN_SPLIT
                                                  - BOOLEAN
                                                  - ON_DATE
                                                  - ON_OR_AFTER_DATE
                                                  - ON_OR_BEFORE_DATE
                                                  - BETWEEN_DATE
                                                  - EQUAL_SET
                                                  - ANY_OF_SET
                                                  - ALL_OF_SET
                                                  - PART_OF_SET
                                                  - EQUAL_NUMBER
                                                  - LESS_THAN_OR_EQUAL_NUMBER
                                                  - GREATER_THAN_OR_EQUAL_NUMBER
                                                  - BETWEEN_NUMBER
                                                  - IN_LIST_STRING
                                                  - STARTS_WITH_STRING
                                                  - ENDS_WITH_STRING
                                                  - CONTAINS_STRING
                                                  - MATCHES_STRING
                                                  - EQUAL_TO_SEMVER
                                                  - GREATER_THAN_OR_EQUAL_TO_SEMVER
                                                  - LESS_THAN_OR_EQUAL_TO_SEMVER
                                                  - BETWEEN_SEMVER
                                                  - IN_LIST_SEMVER
                                              negate:
                                                type: boolean
                                                default: false
                                              feature_flag:
                                                description: "Feature flag name (only for IN_SPLIT type)"
                                                oneOf:
                                                  - $ref: ../common/fme-flag-common-flag-name.yaml
                                                  - $ref: ../common/common-jexl.yaml
                                              attribute:
                                                description: "Attribute name for attribute-based matchers"
                                                type: string
                                              value:
                                                description: "Value for the matcher (can be single, multiple, or between)"
                                                oneOf:
                                                  - type: boolean
                                                  - type: number
                                                  - $ref: ../common/string-without-jexl.yaml
                                                  - type: array
                                                    items:
                                                      oneOf:
                                                        - type: number
                                                        - $ref: ../common/string-without-jexl.yaml
                                                        - $ref: ../common/common-jexl.yaml
                                                  - type: object
                                                    required:
                                                      - from
                                                      - to
                                                    properties:
                                                      from:
                                                        oneOf:
                                                          - type: number
                                                          - $ref: ../common/string-without-jexl.yaml
                                                          - $ref: ../common/common-jexl.yaml
                                                      to:
                                                        oneOf:
                                                          - type: number
                                                          - $ref: ../common/string-without-jexl.yaml
                                                          - $ref: ../common/common-jexl.yaml
                                                  - $ref: ../common/common-jexl.yaml
                                    allocation:
                                      description: "Traffic allocation across treatments"
                                      oneOf:
                                        - type: array
                                          items:
                                            type: object
                                            required:
                                              - treatment
                                              - size
                                            properties:
                                              treatment:
                                                oneOf:
                                                  - $ref: ../common/fme-flag-common-treatment.yaml
                                                  - $ref: ../common/common-jexl.yaml
                                              size:
                                                oneOf:
                                                  - type: integer
                                                    minimum: 0
                                                    maximum: 100
                                                  - $ref: ../common/common-jexl.yaml
                                        - $ref: ../common/common-jexl.yaml
                              - $ref: ../common/common-jexl.yaml
              # At most one entry per instruction type (JSON Schema 2019-09 contains / maxContains)
              - type: array
                minContains: 0
                maxContains: 1
                contains:
                  type: object
                  required:
                    - type
                  properties:
                    type:
                      const: SetDefaultTreatment
              - type: array
                minContains: 0
                maxContains: 1
                contains:
                  type: object
                  required:
                    - type
                  properties:
                    type:
                      const: SetBaselineTreatment
              - type: array
                minContains: 0
                maxContains: 1
                contains:
                  type: object
                  required:
                    - type
                  properties:
                    type:
                      const: SetTrackImpression
              - type: array
                minContains: 0
                maxContains: 1
                contains:
                  type: object
                  required:
                    - type
                  properties:
                    type:
                      const: SetLimitExposure
              - type: array
                minContains: 0
                maxContains: 1
                contains:
                  type: object
                  required:
                    - type
                  properties:
                    type:
                      const: UpdateIndividualTargets
              - type: array
                minContains: 0
                maxContains: 1
                contains:
                  type: object
                  required:
                    - type
                  properties:
                    type:
                      const: UpdateDynamicConfiguration
              - type: array
                minContains: 0
                maxContains: 1
                contains:
                  type: object
                  required:
                    - type
                  properties:
                    type:
                      const: SetTargetingRules
          - $ref: ../common/common-jexl.yaml
$schema: https://json-schema.org/draft/2019-09/schema
