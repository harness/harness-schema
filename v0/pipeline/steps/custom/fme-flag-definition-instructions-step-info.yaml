title: FmeFlagDefinitionInstructionsStepInfo
allOf:
  - $ref: ../../common/step-spec-type.yaml
  - type: object
    required:
      - flagName
      - environment
      - instructions
    properties:
      flagName:
        oneOf:
          - $ref: ../common/fme-flag-common-flag-name.yaml
          - $ref: ../common/common-jexl.yaml
      environment:
        oneOf:
          - $ref: ../common/fme-flag-common-environment.yaml
          - $ref: ../common/common-jexl.yaml
      instructions:
        description: "Ordered list of flag definition instructions to apply atomically"
        oneOf:
          - type: array
            minItems: 1
            items:
              type: object
              additionalProperties: false
              required:
                - type
                - value
              properties:
                type:
                  type: string
                  enum:
                    - SetDefaultTreatment
                    - SetBaselineTreatment
                    - SetTrackImpression
                    - SetLimitExposure
                    - UpdateIndividualTargets
                    - UpdateDynamicConfiguration
                value: {}
              allOf:
                - if:
                    properties:
                      type:
                        enum:
                          - SetDefaultTreatment
                  then:
                    properties:
                      value:
                        oneOf:
                          - $ref: ../common/fme-flag-common-treatment.yaml
                          - $ref: ../common/common-jexl.yaml
                - if:
                    properties:
                      type:
                        enum:
                          - SetBaselineTreatment
                  then:
                    properties:
                      value:
                        oneOf:
                          - $ref: ../common/fme-flag-common-treatment.yaml
                          - $ref: ../common/common-jexl.yaml
                - if:
                    properties:
                      type:
                        enum:
                          - SetTrackImpression
                  then:
                    properties:
                      value:
                        oneOf:
                          - type: boolean
                          - $ref: ../common/common-jexl.yaml
                - if:
                    properties:
                      type:
                        enum:
                          - SetLimitExposure
                  then:
                    properties:
                      value:
                        oneOf:
                          - type: integer
                            minimum: 0
                            maximum: 100
                          - $ref: ../common/common-jexl.yaml
                - if:
                    properties:
                      type:
                        enum:
                          - UpdateIndividualTargets
                  then:
                    properties:
                      value:
                        oneOf:
                          - type: array
                            minItems: 1
                            items:
                              type: object
                              required:
                                - treatment
                                - actions
                              properties:
                                treatment:
                                  $ref: ../common/fme-flag-common-treatment.yaml
                                actions:
                                  type: array
                                  minItems: 1
                                  items:
                                    type: object
                                    required:
                                      - action
                                      - value
                                    properties:
                                      action:
                                        type: string
                                        enum:
                                          - AddKeys
                                          - RemoveKeys
                                          - AddSegments
                                          - RemoveSegments
                                          - SetKeys
                                          - SetSegments
                                      value:
                                        type: array
                                        minItems: 1
                                        items:
                                          type: string
                          - $ref: ../common/common-jexl.yaml
                - if:
                    properties:
                      type:
                        enum:
                          - UpdateDynamicConfiguration
                  then:
                    properties:
                      value:
                        oneOf:
                          - type: array
                            minItems: 1
                            items:
                              type: object
                              required:
                                - treatment
                                - configuration
                              properties:
                                treatment:
                                  $ref: ../common/fme-flag-common-treatment.yaml
                                configuration:
                                  type:
                                    - string
                                    - "null"
                          - $ref: ../common/common-jexl.yaml
          - $ref: ../common/common-jexl.yaml
$schema: http://json-schema.org/draft-07/schema#
