title: FmeFlagSetImpressionTrackingStepInfo
allOf:
  - $ref: ../../common/step-spec-type.yaml
  - type: object
    required:
      - flagName
      - environment
      - enabled
    properties:
      flagName:
        oneOf:
          - $ref: ../common/fme-flag-common-flag-name.yaml
          - $ref: ../common/common-jexl.yaml
      environment:
        oneOf:
          - $ref: ../common/fme-flag-common-environment.yaml
          - $ref: ../common/common-jexl.yaml
      enabled:
        description: "Toggle impression tracking on or off for this flag"
        oneOf:
          - type: boolean
          - $ref: ../common/common-jexl.yaml
$schema: http://json-schema.org/draft-07/schema#
