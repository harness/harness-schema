title: FmeSegmentSetTargetingRulesStepInfo
allOf:
  - $ref: ../../common/step-spec-type.yaml
  - type: object
    required:
      - segmentName
      - environment
    properties:
      segmentName:
        description: "Name of the rule-based segment to configure"
        oneOf:
          - $ref: ../common/fme-segment-common-segment-name.yaml
          - $ref: ../common/common-jexl.yaml
      environment:
        description: "ID of the FME environment"
        oneOf:
          - $ref: ../common/fme-flag-common-environment.yaml
          - $ref: ../common/common-jexl.yaml
      rules:
        description: "List of targeting rules, each containing conditions"
        oneOf:
          - type: array
            items:
              type: object
              required:
                - condition
              properties:
                condition:
                  description: "Condition object containing rules"
                  type: object
                  required:
                    - rules
                  properties:
                    rules:
                      description: "List of condition rules"
                      type: array
                      items:
                        type: object
                        required:
                          - type
                        properties:
                          type:
                            type: string
                            enum:
                              - IN_SEGMENT
                              - IN_SPLIT
                              - BOOLEAN
                              - ON_DATE
                              - ON_OR_AFTER_DATE
                              - ON_OR_BEFORE_DATE
                              - BETWEEN_DATE
                              - EQUAL_SET
                              - ANY_OF_SET
                              - ALL_OF_SET
                              - PART_OF_SET
                              - EQUAL_NUMBER
                              - LESS_THAN_OR_EQUAL_NUMBER
                              - GREATER_THAN_OR_EQUAL_NUMBER
                              - BETWEEN_NUMBER
                              - IN_LIST_STRING
                              - STARTS_WITH_STRING
                              - ENDS_WITH_STRING
                              - CONTAINS_STRING
                              - MATCHES_STRING
                              - EQUAL_TO_SEMVER
                              - GREATER_THAN_OR_EQUAL_TO_SEMVER
                              - LESS_THAN_OR_EQUAL_TO_SEMVER
                              - BETWEEN_SEMVER
                              - IN_LIST_SEMVER
                          negate:
                            type: boolean
                            default: false
                          feature_flag:
                            description: "Feature flag name (only for IN_SPLIT type)"
                            oneOf:
                              - $ref: ../common/fme-flag-common-flag-name.yaml
                              - $ref: ../common/common-jexl.yaml
                          attribute:
                            description: "Attribute name for attribute-based matchers"
                            type: string
                          value:
                            description: "Value for the matcher (can be single, multiple, or between)"
                            oneOf:
                              - type: boolean
                              - type: number
                              - $ref: ../common/string-without-jexl.yaml
                              - type: array
                                items:
                                  oneOf:
                                    - type: number
                                    - $ref: ../common/string-without-jexl.yaml
                                    - $ref: ../common/common-jexl.yaml
                              - type: object
                                required:
                                  - from
                                  - to
                                properties:
                                  from:
                                    oneOf:
                                      - type: number
                                      - $ref: ../common/string-without-jexl.yaml
                                      - $ref: ../common/common-jexl.yaml
                                  to:
                                    oneOf:
                                      - type: number
                                      - $ref: ../common/string-without-jexl.yaml
                                      - $ref: ../common/common-jexl.yaml
                              - $ref: ../common/common-jexl.yaml
          - $ref: ../common/common-jexl.yaml
      excludeKeys:
        description: "List of keys to exclude from the segment"
        oneOf:
          - type: array
            items:
              type: string
          - $ref: ../common/common-jexl.yaml
      excludeSegments:
        description: "List of segments to exclude with name and type"
        oneOf:
          - type: array
            items:
              type: object
              required:
                - name
                - type
              properties:
                name:
                  description: "Name of the segment to exclude"
                  type: string
                type:
                  description: "Type of the segment (standard_segment, rule_based_segment, or large_segment)"
                  type: string
                  enum:
                    - standard_segment
                    - rule_based_segment
                    - large_segment
          - $ref: ../common/common-jexl.yaml
      comment:
        description: "Optional comment for the operation"
        oneOf:
          - $ref: ../common/string-without-jexl.yaml
          - $ref: ../common/common-jexl.yaml
      title:
        description: "Optional title for the operation"
        oneOf:
          - $ref: ../common/string-without-jexl.yaml
          - $ref: ../common/common-jexl.yaml
$schema: http://json-schema.org/draft-07/schema#
