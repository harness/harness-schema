title: LoadTestStepInfo
allOf:
  - $ref: ../../common/step-spec-type.yaml
  - type: object
    required:
      - loadTestRef
    properties:
      loadTestRef:
        type: string
        minLength: 1
      targetUsers:
        oneOf:
          - type: integer
          - $ref: ../common/common-jexl.yaml
      rampUpTimeSec:
        oneOf:
          - type: integer
          - $ref: ../common/common-jexl.yaml
      durationSeconds:
        oneOf:
          - type: integer
          - $ref: ../common/common-jexl.yaml
$schema: http://json-schema.org/draft-07/schema#
