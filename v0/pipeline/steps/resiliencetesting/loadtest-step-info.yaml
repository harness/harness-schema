title: LoadTestStepInfo
allOf:
  - $ref: ../../common/step-spec-type.yaml
  - type: object
    required:
      - loadTestRef
    properties:
      loadTestRef:
        type: string
        minLength: 1
      targetUsers:
        oneOf:
          - type: integer
          - $ref: ../common/common-jexl.yaml
      rampUpTimeSec:
        oneOf:
          - type: integer
          - $ref: ../common/common-jexl.yaml
      durationSeconds:
        oneOf:
          - type: integer
          - $ref: ../common/common-jexl.yaml
      inputs:
        description: "Values for the load test's runtime inputs (entries the selected load test marks as <+input>). Each entry is a name/value pair; value may be fixed or a pipeline expression/runtime input."
        oneOf:
          - type: array
            items:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  minLength: 1
                value:
                  oneOf:
                    - type: integer
                    - $ref: ../common/string-without-jexl.yaml
                    - $ref: ../common/common-jexl.yaml
                type:
                  type: string
                required:
                  type: boolean
          - $ref: ../common/common-jexl.yaml
$schema: http://json-schema.org/draft-07/schema#
