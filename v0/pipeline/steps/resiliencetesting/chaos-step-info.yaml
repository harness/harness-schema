title: ChaosStepInfo
allOf:
  - $ref: ../../common/step-spec-type.yaml
  - type: object
    required:
      - expectedResilienceScore
    properties:
      assertion:
        type: string
      expectedResilienceScore:
        oneOf:
          - type: number
            format: double
          - type: string
            pattern: "(<\\+.+>.*)"
            minLength: 1
      experimentRef:
        type: string
        minLength: 1
      identifier:
        type: string
        minLength: 1
      kind:
        type: string
        enum: [ "experiment", "template" ]
      hubRef:
        type: string
        minLength: 1
      infraReference:
        oneOf:
          - type: string
            minLength: 1
            not:
              pattern: "(<\\+.+>.*)"
          - type: string
            pattern: "(<\\+.+>.*)"
            minLength: 1
      infraType:
        type: string
        enum: [ "Kubernetes", "KubernetesV2", "Linux", "Windows" ]
      experimentValues:
        oneOf:
          - type: array
            items:
              $ref: ../common/chaos-experiment-value.yaml
          - type: string
            pattern: "(<\\+.+>.*)"
            minLength: 1
      tasks:
        oneOf:
          - type: array
            items:
              type: object
              required:
                - identifier
              properties:
                identifier:
                  type: string
                  minLength: 1
                values:
                  type: array
                  items:
                    $ref: ../common/chaos-experiment-value.yaml
          - type: string
            pattern: "(<\\+.+>.*)"
            minLength: 1
    anyOf:
      - required:
          - experimentRef
      - required:
          - identifier
    allOf:
      - if:
          properties:
            identifier:
              type: string
            kind:
              const: "template"
          required:
            - identifier
            - kind
        then:
          required:
            - hubRef
            - infraReference
