title: GenericEntityHttpSpec
type: object
required:
  - method
  - url
properties:
  method:
    type: string
    enum:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
  url:
    type: string
    description: URL template for the HTTP request
  headers:
    type: object
    description: Static headers to include in the request
    additionalProperties:
      type: string
  body:
    type: string
    description: Request body template (supports expression substitution)
$schema: http://json-schema.org/draft-07/schema#
