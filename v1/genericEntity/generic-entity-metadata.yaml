title: GenericEntityMetadata
type: object
required:
  - identifier
  - name
properties:
  identifier:
    type: string
    pattern: ^[a-zA-Z_][0-9a-zA-Z_]{0,127}$
  name:
    type: string
    minLength: 1
    maxLength: 128
  description:
    type: string
    maxLength: 1024
  tags:
    type: object
    additionalProperties:
      type: string
  orgIdentifier:
    type: string
  projectIdentifier:
    type: string
$schema: http://json-schema.org/draft-07/schema#
