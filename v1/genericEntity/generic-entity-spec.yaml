title: GenericEntitySpec
type: object
required:
  - connectorRef
  - httpSpec
properties:
  connectorRef:
    type: string
    description: Reference to a GenericPurpose connector for authentication
  httpSpec:
    $ref: ./generic-entity-http-spec.yaml
  inputSchema:
    type: object
    description: JSON Schema defining the inputs this entity accepts
  outputMapping:
    type: object
    description: Map of output variable names to JSONPath expressions
    additionalProperties:
      type: string
$schema: http://json-schema.org/draft-07/schema#
