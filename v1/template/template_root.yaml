type: object
title: template
required:
  - template
properties:
  version:
    type: number
    enum:
      - 1
  template:
    type: object
    properties:
      name:
        type: string
        description: Display name of the template.
      description:
        type: string
        description: Description of the template.
      tags:
        type: object
        description: Tags for the template.
        additionalProperties:
          type: string
      inputs:
        $ref: ../pipeline/common/unified-inputs.yaml
    oneOf:
      - required:
          - pipeline
        properties:
          pipeline:
            $ref: ../pipeline/pipeline.yaml
      - required:
          - stage
        properties:
          stage:
            $ref: ../pipeline/stages/unified/unified-stage.yaml
      - required:
          - step
        properties:
          step:
            $ref: ../pipeline/steps/unified/step-items.yaml
      - required:
          - group
        properties:
          group:
            $ref: ./group/group-body.yaml
$schema: http://json-schema.org/draft-07/schema#
