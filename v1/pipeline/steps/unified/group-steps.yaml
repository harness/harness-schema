title: GroupSteps
description: Defines a group of steps.
type: object
required:
  - group
properties:
  group:
    type: object
    required:
      - steps
    properties:
      id:
        type: string
        description: Unique identifier for the step group.
        pattern: "^[a-zA-Z_][0-9a-zA-Z_]{0,127}$"
      name:
        type: string
        description: Display name of the step group.
      desc:
        type: string
        description: Description of the step group.
      if:
        type: string
        description: Conditional execution expression. Group is skipped if condition resolves to false.
      strategy:
        description: Execution strategy (matrix, for, while, repeat). Supports expressions.
        oneOf:
          - $ref: ../../common/strategy.yaml
          - $ref: ../../common/expression.yaml
      on-failure:
        $ref: ../../common/on-failure.yaml
      timeout:
        type: string
        description: Step group timeout duration.
        pattern: ^(([1-9])+\d+[s])|(((([1-9])+\d*[mhwd])+([\s]?\d+[smhwd])*)|(.*<\+.*>(?!.*\.executionInput\(\)).*)|(^$))$
      output:
        description: |
          Step group output variables. Each entry is a single key:value pair where the key is the
          SG-published output name and the value is either a plain-string descendant step output
          name to capture, or a Harness expression evaluated at step group completion.
        type: array
        items:
          type: object
          minProperties: 1
          maxProperties: 1
          additionalProperties: false
          patternProperties:
            "^[a-zA-Z_][a-zA-Z0-9_]*$":
              type: string
      steps:
        type: array
        items:
          $ref: ./step-items.yaml
$schema: http://json-schema.org/draft-07/schema#

