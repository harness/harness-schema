title: StepItems
description: Available step types for pipeline execution.
type: object
if:
  anyOf:
    - required: [run]
    - required: [action]
    - required: [clone]
    - required: [background]
    - required: [run-test]
    - required: [wait]
    - required: [barrier]
    - required: [queue]
    - required: [policy]
    - required: [approval]
    - required: [parallel]
    - required: [group]
    - required: [template]
then:
  allOf:
    - if:
        anyOf:
          - required: [run]
          - required: [action]
          - required: [clone]
          - required: [background]
          - required: [run-test]
      then:
        $ref: ./unified-step.yaml
    - if:
        required: [wait]
      then:
        $ref: ./wait-step.yaml
    - if:
        required: [barrier]
      then:
        $ref: ./barrier-step.yaml
    - if:
        required: [queue]
      then:
        $ref: ./queue-step.yaml
    - if:
        required: [policy]
      then:
        $ref: ./policy-step.yaml
    - if:
        required: [approval]
      then:
        $ref: ./approval-step.yaml
    - if:
        required: [parallel]
      then:
        $ref: ./parallel-steps.yaml
    - if:
        required: [group]
      then:
        $ref: ./group-steps.yaml
    - if:
        required: [template]
      then:
        $ref: ../../common/unified-template.yaml
else:
  required: [run]
$schema: http://json-schema.org/draft-07/schema#

