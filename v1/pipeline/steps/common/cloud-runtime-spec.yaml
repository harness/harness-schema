title: CloudRuntimeSpec
type: object
properties:
  size:
    oneOf:
      - type: string
        enum:
          - flex
          - small
          - medium
          - large
          - xlarge
          - xxlarge
          - xxxlarge
      - type: string
        pattern: (<\+.+>.*)
        minLength: 1
  virtualization:
    oneOf:
      - type: boolean
      - type: string
        pattern: (<\+.+>.*)
        minLength: 1
  image:
    description: "Custom image for BYOI. GCP format: 'name:version'. Mac: fully qualified registry image."
    oneOf:
      - type: string
      - type: string
        pattern: (<\+.+>.*)
        minLength: 1
  connector:
    description: "Docker registry connector reference for Mac BYOI images."
    oneOf:
      - type: string
      - type: string
        pattern: (<\+.+>.*)
        minLength: 1
  description:
    desc: This is the description for CloudRuntimeSpec
$schema: http://json-schema.org/draft-07/schema#
