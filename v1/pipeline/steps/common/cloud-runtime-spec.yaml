title: CloudRuntimeSpec
type: object
properties:
  size:
    oneOf:
      - type: string
        enum:
          - flex
          - small
          - medium
          - large
          - xlarge
          - xxlarge
          - xxxlarge
      - type: string
        pattern: (<\+.+>.*)
        minLength: 1
  virtualization:
    oneOf:
      - type: boolean
      - type: string
        pattern: (<\+.+>.*)
        minLength: 1
  description:
    desc: This is the description for CloudRuntimeSpec
$schema: http://json-schema.org/draft-07/schema#
