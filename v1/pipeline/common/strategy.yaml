title: StrategyConfigV1
type: object
description: Strategy defines execution strategy configuration (matrix, for, while, repeat).
properties:
  max-parallel:
    description: Maximum number of parallel executions. Supports expressions.
    oneOf:
      - type: integer
      - $ref: ./expression.yaml
  fail-fast:
    description: Whether to fail fast on first failure. Supports expressions.
    oneOf:
      - type: boolean
      - $ref: ./expression.yaml
  if:
    description: Conditional expression to determine whether the strategy should execute. Supports expressions.
    type: string
oneOf:
  - properties:
      matrix:
        oneOf:
          - $ref: ./strategy_matrix.yaml
          - $ref: ./expression.yaml
    required:
      - matrix
  - properties:
      for:
        oneOf:
          - $ref: ./strategy_for.yaml
          - $ref: ./expression.yaml
    required:
      - for
  - properties:
      while:
        oneOf:
          - $ref: ./strategy_while.yaml
          - $ref: ./expression.yaml
    required:
      - while
  - properties:
      repeat:
        oneOf:
          - $ref: ./strategy_repeat.yaml
          - $ref: ./expression.yaml
    required:
      - repeat
$schema: http://json-schema.org/draft-07/schema#
