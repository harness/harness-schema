title: Retry
properties:
  attempts:
    type: number
    example: 3
  interval:
    anyOf:
      - items:
          type: string
          format: duration
        type: array
        example: [ 5s, 10s, 20s ]
      - type: string
        example: 1m
        format: duration
  condition:
    type: string
    description: Expression that evaluates to determine if retry should be performed, e.g. '<+step.exitCode> == 137'
    example: <+step.exitCode> == 137
  failure:
    $ref: ./retry_failure.yaml
type: object