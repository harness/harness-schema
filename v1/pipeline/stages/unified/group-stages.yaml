title: GroupStages
description: Group of stages executed sequentially.
type: object
required:
  - group
properties:
  group:
    description: Group configuration.
    type: object
    properties:
      id:
        description: Unique identifier for the group.
        type: string
      name:
        description: Display name of the group.
        type: string
      stages:
        description: Stages within the group.
        type: array
        items:
          type: object
          if:
            anyOf:
              - required: [steps]
              - required: [chain]
              - required: [parallel]
              - required: [group]
          then:
            allOf:
              - if:
                  required: [steps]
                then:
                  $ref: ./unified-stage.yaml
              - if:
                  required: [chain]
                then:
                  $ref: ./pipeline-chain.yaml
              - if:
                  required: [parallel]
                then:
                  $ref: ./parallel-stages.yaml
              - if:
                  required: [group]
                then:
                  $ref: ./group-stages.yaml
          else:
            required: [steps]
        minItems: 1
$schema: http://json-schema.org/draft-07/schema#

