title: RuntimeV1
description: Runtime execution engine configuration. Either a string shorthand (cloud|shell|vm|k8) or an object carrying one of the runtime specs.
$schema: http://json-schema.org/draft-07/schema#
oneOf:
  # String shorthand — handled by RuntimeV1Deserializer.
  - type: string
    enum:
      - cloud
      - shell
      - vm
      - k8
  # Object form — mirrors io.harness.beans.yaml.extended.runtime.V1.RuntimeV1 fields.
  - type: object
    additionalProperties: false
    properties:
      shell:
        description: Shell runtime specification.
        $ref: ./runtime_shell.yaml
      cloud:
        description: Cloud runtime specification.
        $ref: ./runtime_cloud.yaml
      vm:
        description: VM runtime specification.
        $ref: ./runtime_vm.yaml
      kubernetes:
        description: Kubernetes runtime specification.
        $ref: ./runtime_kubernetes.yaml
