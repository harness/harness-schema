title: ParallelStages
description: Parallel stages execution configuration.
type: object
required:
  - parallel
properties:
  parallel:
    description: Stages to execute in parallel.
    type: object
    required:
      - stages
    properties:
      stages:
        type: array
        items:
          type: object
          if:
            anyOf:
              - required: [steps]
              - required: [chain]
              - required: [group]
          then:
            allOf:
              - if:
                  required: [steps]
                then:
                  $ref: ./unified-stage.yaml
              - if:
                  required: [chain]
                then:
                  $ref: ./pipeline-chain.yaml
              - if:
                  required: [group]
                then:
                  $ref: ./group-stages.yaml
          else:
            required: [steps]
        minItems: 1
$schema: http://json-schema.org/draft-07/schema#

