title: EnvironmentV1
description: Environment configuration for CD stages.
oneOf:
  # Single environment with id
  - type: object
    required:
      - id
    properties:
      id:
        description: Environment identifier.
        type: string
      deploy-to:
        description: Infrastructure(s) to deploy to.
        $ref: ./deploy-to.yaml
      ref:
        description: Git branch for the environment configuration.
        type: string
    additionalProperties: false
  # Multi-environment with items
  - type: object
    required:
      - items
    properties:
      items:
        description: List of environments for multi-environment deployment.
        $ref: ./environment-items.yaml
      parallel:
        description: Execute environments in parallel (all at once). Defaults to false, so environments run one at a time (serially) unless set to true.
        oneOf:
          - type: boolean
            default: false
          - $ref: ../../common/expression.yaml
    additionalProperties: false
  # Multi-environment with group
  - type: object
    required:
      - group
    properties:
      group:
        description: Environment group configuration.
        $ref: ./environment-group.yaml
      parallel:
        description: Execute environments in parallel (all at once). Defaults to false, so environments run one at a time (serially) unless set to true.
        oneOf:
          - type: boolean
            default: false
          - $ref: ../../common/expression.yaml
    additionalProperties: false
  # Multi-environment with filters
  - type: object
    required:
      - filters
    properties:
      filters:
        description: Filters for selecting environments and infrastructures.
        $ref: ./filters.yaml
      parallel:
        description: Execute environments in parallel (all at once). Defaults to false, so environments run one at a time (serially) unless set to true.
        oneOf:
          - type: boolean
            default: false
          - $ref: ../../common/expression.yaml
    additionalProperties: false
$schema: http://json-schema.org/draft-07/schema#
